<!-- @dsCard group="Type" viewport="700x290" name="Type scale" subtitle="Display steps, 48 → 14" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 36px; }
  .line { display: flex; align-items: baseline; gap: 20px; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 76px; flex: none; }
  .sample { font-family: var(--font-display); font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; line-height: 1.1; }
</style>
</head>
<body>
  <div class="line"><span class="tag">5xl · 60</span><span class="sample" style="font-size:60px">Aa</span></div>
  <div class="line"><span class="tag">4xl · 48</span><span class="sample" style="font-size:48px">Compress the diamond</span></div>
  <div class="line"><span class="tag">3xl · 38</span><span class="sample" style="font-size:38px">Quiet infrastructure</span></div>
  <div class="line"><span class="tag">2xl · 30</span><span class="sample" style="font-size:30px">Reduce the noise</span></div>
  <div class="line"><span class="tag">xl · 24</span><span class="sample" style="font-size:24px">Protect the focus</span></div>
  <div class="line"><span class="tag">base · 16</span><span class="sample" style="font-size:16px;font-weight:500;font-family:var(--font-body)">Build the system, repeat with discipline</span></div>
</body>
</html>
