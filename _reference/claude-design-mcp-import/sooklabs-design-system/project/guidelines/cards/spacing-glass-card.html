<!-- @dsCard group="Spacing" viewport="700x240" name="Matte glass card" subtitle="The signature surface — hairline + glow + inset edge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-void); padding: 34px 40px; position: relative; overflow: hidden; }
  body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 40%, var(--glow-blue), transparent 60%), radial-gradient(ellipse at 80% 80%, var(--glow-violet), transparent 60%); }
  .card { position: relative; max-width: 340px; padding: 24px; border-radius: var(--radius-xl); background: var(--glass-bg); backdrop-filter: blur(var(--blur-md)); -webkit-backdrop-filter: blur(var(--blur-md)); border: 1px solid var(--glass-border); box-shadow: var(--shadow-lg), var(--inset-top); }
  .over { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-glow); margin-bottom: 12px; }
  .t { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 8px; }
  .d { font-family: var(--font-body); font-size: 14px; line-height: 1.55; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="card">
    <div class="over">Matte glass</div>
    <div class="t">One calm inbox for every channel.</div>
    <div class="d">Translucent ink, blurred over a glow field, lit by a hairline inset edge.</div>
  </div>
</body>
</html>
