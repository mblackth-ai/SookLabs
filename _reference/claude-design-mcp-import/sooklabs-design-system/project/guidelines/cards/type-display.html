<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 30px 36px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 52px; line-height: 1.06; letter-spacing: -0.03em; color: var(--text-primary); max-width: 600px; }
  .specs { display: flex; gap: 24px; margin-top: 18px; }
  .specs span { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="ey">Display · Bricolage Grotesque</div>
  <h1>Systems that turn repetition into infrastructure.</h1>
  <div class="specs">
    <span>700 bold</span><span>tracking -0.03em</span><span>leading 1.06</span><span>48–76px</span>
  </div>
</body>
</html>
