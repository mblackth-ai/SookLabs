<!-- @dsCard group="Type" viewport="700x210" name="Mono — DM Mono" subtitle="Overlines, metrics, status — the OS register" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 30px 36px; display: flex; flex-direction: column; gap: 18px; }
  .over { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
  .metric { font-family: var(--font-mono); font-size: 40px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.01em; }
  .metric small { font-size: 16px; color: var(--accent-glow); }
  .status { font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); display: flex; gap: 18px; }
  .status em { font-style: normal; color: var(--signal-success); }
</style>
</head>
<body>
  <div class="over">Operating rule · Current projects · Status</div>
  <div class="metric">1,240 <small>+12%</small></div>
  <div class="status"><span>BUILT</span><span style="color:var(--signal-info)">IN&nbsp;PROGRESS</span><span><em>0 dropped</em></span></div>
</body>
</html>
