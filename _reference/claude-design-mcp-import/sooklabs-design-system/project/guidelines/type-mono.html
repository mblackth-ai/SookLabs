<!-- @dsCard group="Type" viewport="700x180" name="Mono — IBM Plex Mono" subtitle="Eyebrows, labels, metrics, system readouts" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-mono);
         padding:24px; color:var(--text-body); }
  .eyebrow { font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cyan-400); }
  .label   { font-size:13px; letter-spacing:.04em; color:var(--text-secondary); margin-top:16px; }
  .metric  { font-size:13px; color:var(--text-primary); margin-top:8px; }
  .num     { color:var(--success-500); }
  .meta    { font-size:11px; color:var(--text-subtle); margin-top:16px; }
</style>
</head>
<body>
  <div class="eyebrow">// Operating Rule</div>
  <div class="label">STATUS · 3 enquiries routed · 0 dropped</div>
  <div class="metric">organic_clicks <span class="num">1,240 ▲ +12%</span> · health 84/100</div>
  <div class="meta">IBM Plex Mono · 400 / 500 · uppercase eyebrows tracking 0.2em</div>
</body>
</html>
