<!-- @dsCard group="Colors" viewport="700x180" name="Ink & Surfaces" subtitle="Charcoal background and surface ramp" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans);
         padding:22px 24px; color:var(--text-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:var(--radius-md); border:1px solid var(--border);
          box-shadow:var(--shadow-card); }
  .name { font-family:var(--font-mono); font-size:11px; color:var(--text-muted);
          margin-top:10px; letter-spacing:.02em; }
  .hex  { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="name">--ink-950</div><div class="hex">#07090D</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">--ink-900 · page</div><div class="hex">#0B0E13</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><div class="name">--ink-850 · band</div><div class="hex">#10141B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">--ink-800 · surface</div><div class="hex">#151A23</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-750)"></div><div class="name">--ink-750 · card</div><div class="hex">#1A202B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">--ink-700 · raised</div><div class="hex">#222A35</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="name">--ink-600 · inset</div><div class="hex">#2C3541</div></div>
  </div>
</body>
</html>
