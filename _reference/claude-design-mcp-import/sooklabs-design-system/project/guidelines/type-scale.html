<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="Modular ramp, 11 → 92px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-display);
         padding:22px 24px; color:var(--text-heading); }
  .r { display:flex; align-items:baseline; gap:16px; margin-bottom:6px; }
  .s { font-weight:600; letter-spacing:-0.02em; line-height:1.1; white-space:nowrap; }
  .t { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); }
</style>
</head>
<body>
  <div class="r"><span class="s" style="font-size:52px">Origin</span><span class="t">5xl–7xl · hero</span></div>
  <div class="r"><span class="s" style="font-size:34px">Section heading</span><span class="t">3xl · 38px</span></div>
  <div class="r"><span class="s" style="font-size:24px">Card title</span><span class="t">xl · 24px</span></div>
  <div class="r"><span class="s" style="font-size:18px;font-weight:500">Subhead / lead</span><span class="t">md · 18px</span></div>
  <div class="r"><span class="s" style="font-size:15px;font-family:var(--font-sans);font-weight:400;color:var(--text-secondary)">Body copy — DM Sans</span><span class="t">sm · 14–16px</span></div>
  <div class="r"><span class="s" style="font-size:12px;font-family:var(--font-mono);font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan-400)">Eyebrow label</span><span class="t">xs · 12px mono</span></div>
</body>
</html>
