<!-- @dsCard group="Colors" viewport="700x190" name="Ink surfaces" subtitle="Charcoal-navy ground scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 80px; border-radius: 12px; border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="name">void</div><div class="hex">#06090F</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="name">page</div><div class="hex">#0A0E16</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><div class="name">alt</div><div class="hex">#0E1320</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="name">raised</div><div class="hex">#121829</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-750)"></div><div class="name">card</div><div class="hex">#161D30</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="name">inset</div><div class="hex">#1C2438</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-650)"></div><div class="name">hover</div><div class="hex">#232D44</div></div>
  </div>
</body>
</html>
