<!-- @dsCard group="Brand" viewport="700x200" name="Waveform glyph" subtitle="The signal mark — cyan to blue" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); display: flex; align-items: center; gap: 28px; padding: 28px 40px; }
  .tile { display: grid; place-items: center; border-radius: 18px; border: 1px solid var(--border-subtle); background: var(--bg-void); }
  .tile img { display: block; }
  .a { width: 120px; height: 120px; }
  .a img { width: 120px; height: 120px; border-radius: 16px; }
  .b { width: 64px; height: 64px; }
  .b img { width: 64px; height: 64px; border-radius: 12px; }
  .c { width: 40px; height: 40px; }
  .c img { width: 40px; height: 40px; border-radius: 9px; }
  .note { margin-left: 8px; }
  .note .t { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--text-primary); margin-bottom: 6px; }
  .note .d { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); max-width: 240px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="tile a"><img src="../../assets/sooklabs-glyph.png" alt="glyph" /></div>
  <div class="tile b"><img src="../../assets/sooklabs-glyph.png" alt="glyph" /></div>
  <div class="tile c"><img src="../../assets/sooklabs-glyph.png" alt="glyph" /></div>
  <div class="note">
    <div class="t">Signal waveform</div>
    <div class="d">A calm, structured wave — the mark for app icons, favicons, and the hero origin point.</div>
  </div>
</body>
</html>
