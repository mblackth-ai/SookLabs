<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 30px 36px; }
  .ey { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
  p { font-family: var(--font-body); font-size: 18px; line-height: 1.6; color: var(--text-secondary); max-width: 560px; }
  p b { color: var(--text-primary); font-weight: 600; }
  .specs { display: flex; gap: 24px; margin-top: 18px; }
  .specs span { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="ey">Body · DM Sans</div>
  <p>SookLabs builds calm digital systems for businesses, operators, and builders who need <b>fewer interruptions, clearer workflows, and more time to focus.</b></p>
  <div class="specs">
    <span>400 / 500 / 600</span><span>leading 1.5–1.65</span><span>14–20px</span>
  </div>
</body>
</html>
