<!-- @dsCard group="Colors" viewport="700x180" name="Secondary Accents" subtitle="Restrained blue, violet, silver" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans);
         padding:22px 24px; color:var(--text-body); }
  .row { display:flex; gap:14px; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:var(--radius-md); border:1px solid var(--border); }
  .name { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:10px; }
  .hex  { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="name">--blue-400</div><div class="hex">#7AA3F5</div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="name">--blue-500</div><div class="hex">#5B8CF0</div></div>
    <div class="sw"><div class="chip" style="background:var(--violet-400)"></div><div class="name">--violet-400</div><div class="hex">#A89EF6</div></div>
    <div class="sw"><div class="chip" style="background:var(--violet-500)"></div><div class="name">--violet-500</div><div class="hex">#8E83F2</div></div>
    <div class="sw"><div class="chip" style="background:var(--silver)"></div><div class="name">--silver</div><div class="hex">#C5CEDC</div></div>
    <div class="sw"><div class="chip" style="background:var(--silver-dim)"></div><div class="name">--silver-dim</div><div class="hex">#8D97A7</div></div>
  </div>
</body>
</html>
