<!-- @dsCard group="Colors" viewport="700x180" name="Text on Dark" subtitle="Soft white → silver → muted hierarchy" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans);
         padding:24px; color:var(--text-body); }
  .stack { display:flex; flex-direction:column; gap:13px; }
  .line { display:flex; align-items:baseline; gap:16px; }
  .sample { font-family:var(--font-display); font-size:21px; font-weight:600; letter-spacing:-0.01em; min-width:300px; }
  .tok { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="sample" style="color:var(--text-strong)">Reduce the noise. Build the system.</span><span class="tok">--text-strong · #F2F5F9</span></div>
    <div class="line"><span class="sample" style="color:var(--text-primary);font-weight:500">Calm digital systems for operators.</span><span class="tok">--text-primary · #E3E8F0</span></div>
    <div class="line"><span class="sample" style="color:var(--text-secondary);font-weight:400">Fewer interruptions, clearer workflows.</span><span class="tok">--text-secondary · #A3ADBD</span></div>
    <div class="line"><span class="sample" style="color:var(--text-tertiary);font-weight:400">Supporting detail, captions, meta.</span><span class="tok">--text-tertiary · #6D7889</span></div>
  </div>
</body>
</html>
