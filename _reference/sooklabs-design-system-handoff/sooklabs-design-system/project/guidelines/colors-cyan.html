<!-- @dsCard group="Colors" viewport="700x180" name="Signature Cyan" subtitle="The waveform accent — primary brand color" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-page); font-family:var(--font-sans);
         padding:22px 24px; color:var(--text-body); }
  .row { display:flex; gap:14px; align-items:flex-start; }
  .sw { flex:1; }
  .chip { height:64px; border-radius:var(--radius-md); border:1px solid var(--border); }
  .name { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:10px; }
  .hex  { font-family:var(--font-mono); font-size:11px; color:var(--text-subtle); margin-top:2px; }
  .glowchip { box-shadow:var(--glow-cyan); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cyan-300)"></div><div class="name">--cyan-300</div><div class="hex">#74E9F1</div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-400)"></div><div class="name">--cyan-400 · bright</div><div class="hex">#4FE1EC</div></div>
    <div class="sw"><div class="chip glowchip" style="background:var(--cyan-500)"></div><div class="name">--cyan-500 · PRIMARY</div><div class="hex">#2BD2E0</div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-600)"></div><div class="name">--cyan-600 · deep</div><div class="hex">#1FB0C2</div></div>
    <div class="sw"><div class="chip" style="background:var(--cyan-700)"></div><div class="name">--cyan-700</div><div class="hex">#178496</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><div class="name">--teal-500</div><div class="hex">#29C2B1</div></div>
  </div>
</body>
</html>
