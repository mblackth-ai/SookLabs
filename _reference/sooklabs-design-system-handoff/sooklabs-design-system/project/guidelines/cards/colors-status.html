<!-- @dsCard group="Colors" viewport="700x170" name="Status signals" subtitle="Restrained, desaturated for dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 26px 32px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; display: flex; align-items: center; gap: 10px; padding: 14px; border-radius: 12px; background: var(--surface-card); border: 1px solid var(--border-subtle); }
  .dot { width: 10px; height: 10px; border-radius: 999px; flex: none; }
  .lbl { font-family: var(--font-body); font-size: 13px; color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><span class="dot" style="background:var(--signal-success)"></span><div><div class="lbl">Success</div><div class="hex">#4ADE9E</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--signal-warning)"></span><div><div class="lbl">Warning</div><div class="hex">#F4C152</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--signal-danger)"></span><div><div class="lbl">Danger</div><div class="hex">#F4787A</div></div></div>
    <div class="sw"><span class="dot" style="background:var(--signal-info)"></span><div><div class="lbl">Info</div><div class="hex">#5793F5</div></div></div>
  </div>
</body>
</html>
