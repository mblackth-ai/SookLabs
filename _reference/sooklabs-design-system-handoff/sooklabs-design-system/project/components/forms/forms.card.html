<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-page); padding: 30px 32px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px 28px; align-items: start; }
  .switches { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Switch } = window.SookLabsDesignSystem_9aa38b;
  const Mail = () => (<svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/></svg>);

  function Demo() {
    const [a, setA] = React.useState("");
    const [r, setR] = React.useState(true);
    const [n, setN] = React.useState(false);
    return (
      <div className="grid">
        <Input label="Work email" placeholder="you@company.com" iconLeft={<Mail/>} value={a} onChange={e=>setA(e.target.value)} hint="We never share this." />
        <Input label="Domain" placeholder="https://" error="Enter a valid URL." />
        <div className="switches">
          <Switch checked={r} onChange={setR} label="Auto-route enquiries" />
          <Switch checked={n} onChange={setN} label="Email notifications" />
          <Switch checked={false} disabled label="Disabled" />
        </div>
        <Input label="Search inbox" placeholder="Search messages…" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
