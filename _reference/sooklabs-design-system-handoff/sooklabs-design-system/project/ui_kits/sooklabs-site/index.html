<style>
  body { margin: 0; background: var(--bg-page); }
  .sl-mob { display: none; }
  .sl-navlink { transition: color .2s var(--ease-out); }
  .sl-navlink:hover { color: var(--text-primary); }
  .sl-cardlink { transition: gap .2s var(--ease-out), opacity .2s; }
  .sl-cardlink:hover { opacity: 0.8; }

  /* Fine control-room grid backdrop in hero */
  .sl-grid-bg {
    position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 75%);
    mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 30%, transparent 75%);
  }

  /* Decorative motion only — never hides content (safe for print / reduced-motion / static capture) */
  @media (prefers-reduced-motion: no-preference) {
    .sl-spin { animation: slSpin 24s linear infinite; }
    .sl-spin-slow { animation: slSpin 40s linear infinite; }
    .sl-glyph-pulse { animation: slPulse 5s var(--ease-in-out) infinite; }
  }
  @keyframes slSpin { to { transform: rotate(360deg); } }
  @keyframes slReveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
  @keyframes slPulse { 0%,100% { box-shadow: 0 0 0 1px var(--border-strong), var(--shadow-lg), 0 0 40px rgba(52,207,234,0.28); } 50% { box-shadow: 0 0 0 1px var(--border-strong), var(--shadow-lg), 0 0 64px rgba(52,207,234,0.5); } }

  @media (max-width: 860px) {
    .sl-desk { display: none !important; }
    .sl-mob { display: inline-flex; }
    .sl-2col, .sl-foot { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .sl-foot { grid-template-columns: 1fr 1fr !important; }
  }
</style>
